<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice set 9</title>
    <style>
        .loader{
            height: 200px;
            width: 200px;
            border-radius: 50% ;
            border: 20px solid #AB4E52;
            border-left: 20px solid #E7D7C1;
            animation: spinAnimate 2s linear 0s infinite normal;
        }
        @keyframes spinAnimate{
            from{
                transform:rotate(0deg);
            }
            to{
                transform:rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="loader"></div>
</body>
</html>
